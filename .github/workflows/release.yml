name: LeanCoder CI/CD & Marketplace Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-package:
    name: Build, Test & Package VSIX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Compilation
        run: npm run compile

      - name: Run Test Suite
        run: xvfb-run -a npm test

      - name: Package Extension VSIX
        run: npx vsce package --out leancoder.vsix

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: leancoder-vsix
          path: leancoder.vsix

  publish-marketplace:
    name: Publish to VS Code Marketplace
    needs: build-and-package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: leancoder-vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath leancoder.vsix
